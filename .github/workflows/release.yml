name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to produce.
        required: true
        type: choice
        default: beta
        options:
          - alpha
          - beta
          - rc
          - release
      version:
        description: Marketing version in MAJOR.MINOR.PATCH form, for example 0.2.0.
        required: true
        type: string
      prerelease:
        description: Prerelease number for alpha, beta, or rc tags. Leave empty for final release.
        required: false
        type: string
      build:
        description: Bundle build number for CFBundleVersion and Sparkle. Leave empty to use the workflow run number.
        required: false
        type: string
      ci_suite:
        description: CI checks to run before packaging.
        required: true
        type: choice
        default: full
        options:
          - full
          - swiftpm
          - xcode
          - skip
      signing:
        description: Signing mode for the app bundle.
        required: true
        type: choice
        default: local
        options:
          - local
          - project
          - developer-id
      create_github_release:
        description: Create a draft GitHub Release and upload release assets.
        required: true
        type: boolean
        default: false
      source_run_id:
        description: Dry-run workflow run ID to reuse for draft release assets. Leave empty to build/package in this run.
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.channel }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Release workflow must run from main. Current ref is ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Require Developer ID for final release
        if: ${{ inputs.channel == 'release' && inputs.signing != 'developer-id' }}
        run: |
          echo "::error::Final releases must use signing=developer-id."
          exit 1

      - name: Require Developer ID for GitHub Release assets
        if: ${{ inputs.create_github_release && inputs.signing != 'developer-id' }}
        run: |
          echo "::error::GitHub Release assets must use signing=developer-id."
          exit 1

      - name: Validate source dry-run input
        env:
          CREATE_GITHUB_RELEASE: ${{ inputs.create_github_release }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          source_run_id="${SOURCE_RUN_ID}"
          if [[ -z "${source_run_id}" ]]; then
            exit 0
          fi
          if [[ "${CREATE_GITHUB_RELEASE}" != "true" ]]; then
            echo "::error::source_run_id can only be used with create_github_release=true."
            exit 1
          fi
          if [[ ! "${source_run_id}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::source_run_id must be a GitHub Actions run ID."
            exit 1
          fi

      - name: Validate prerelease input
        env:
          CHANNEL: ${{ inputs.channel }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease="${PRERELEASE}"
          if [[ "${CHANNEL}" == "release" ]]; then
            if [[ -n "${prerelease}" ]]; then
              echo "::error::Final releases must leave prerelease empty."
              exit 1
            fi
          elif [[ ! "${prerelease}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Alpha, beta, and rc releases require a positive prerelease number."
            exit 1
          fi

  ci:
    name: Selected CI
    needs: [preflight]
    if: ${{ inputs.ci_suite != 'skip' && inputs.source_run_id == '' }}
    uses: ./.github/workflows/ci-checks.yml
    with:
      suite: ${{ inputs.ci_suite }}
    secrets: inherit

  package:
    name: Package Release Artifact
    runs-on: macos-26
    needs: [preflight, ci]
    if: ${{ always() && needs.preflight.result == 'success' && inputs.source_run_id == '' && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    environment:
      name: release-signing
      deployment: false
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Remove unused runner Homebrew taps
        run: |
          bash .github/scripts/remove_unused_homebrew_taps.sh aws/tap azure/bicep

      - name: Verify generated Xcode project is current
        run: |
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi
          xcodegen generate --quiet
          if ! git diff --exit-code -- MacActivity.xcodeproj; then
            echo "::error::MacActivity.xcodeproj is out of sync with project.yml. Run xcodegen generate."
            exit 1
          fi

      - name: Resolve build number
        id: build
        env:
          REQUESTED_BUILD: ${{ inputs.build }}
        run: |
          build="${REQUESTED_BUILD}"
          if [[ -z "${build}" ]]; then
            build="${GITHUB_RUN_NUMBER}"
          fi
          echo "build=${build}" >> "${GITHUB_OUTPUT}"

      - name: Check release conflicts
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          BUILD: ${{ steps.build.outputs.build }}
        run: |
          python3 .github/scripts/plan_release.py \
            --channel "${CHANNEL}" \
            --version "${VERSION}" \
            --prerelease "${PRERELEASE}" \
            --build "${BUILD}" \
            --remote

      - name: Prepare release metadata
        id: release
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          BUILD: ${{ steps.build.outputs.build }}
        run: |
          python3 .github/scripts/prepare_release_metadata.py \
            --channel "${CHANNEL}" \
            --version "${VERSION}" \
            --prerelease "${PRERELEASE}" \
            --build "${BUILD}" \
            --xcconfig Configuration/Shared.xcconfig

      - name: Resolve release target commit
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Import Developer ID certificate
        if: ${{ inputs.signing == 'developer-id' }}
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          BUILD_KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}" ]]; then
            echo "::error::DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 secret is required."
            exit 1
          fi
          if [[ -z "${DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}" ]]; then
            echo "::error::DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD secret is required."
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/macactivity-signing.keychain-db"
          keychain_password="${BUILD_KEYCHAIN_PASSWORD:-$(uuidgen)}"

          echo -n "${DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"

      - name: Build Release app
        env:
          MAC_ACTIVITY_DEVELOPMENT_TEAM: ${{ vars.APPLE_TEAM_ID }}
          MAC_ACTIVITY_DEVELOPER_ID_IDENTITY: ${{ vars.DEVELOPER_ID_APPLICATION_IDENTITY }}
          SIGNING: ${{ inputs.signing }}
        run: |
          signing_arg="--${SIGNING}-signing"
          MAC_ACTIVITY_DERIVED_DATA="${RUNNER_TEMP}/MacActivityRelease" \
            scripts/install-local-release.command \
              --build-only \
              --skip-launch \
              --skip-quit \
              "${signing_arg}"

      - name: Validate bundle version
        run: |
          app="${RUNNER_TEMP}/MacActivityRelease/Build/Products/Release/Mac Activity.app"
          info_plist="${app}/Contents/Info.plist"
          actual_version="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "${info_plist}")"
          actual_build="$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "${info_plist}")"
          actual_release_tag="$(/usr/libexec/PlistBuddy -c "Print MacActivityReleaseTag" "${info_plist}")"
          if [[ "${actual_version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "::error::Expected CFBundleShortVersionString ${{ steps.release.outputs.version }}, got ${actual_version}"
            exit 1
          fi
          if [[ "${actual_build}" != "${{ steps.release.outputs.build }}" ]]; then
            echo "::error::Expected CFBundleVersion ${{ steps.release.outputs.build }}, got ${actual_build}"
            exit 1
          fi
          if [[ "${actual_release_tag}" != "${{ steps.release.outputs.tag }}" ]]; then
            echo "::error::Expected MacActivityReleaseTag ${{ steps.release.outputs.tag }}, got ${actual_release_tag}"
            exit 1
          fi

      - name: Notarize Developer ID app
        if: ${{ inputs.signing == 'developer-id' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          app="${RUNNER_TEMP}/MacActivityRelease/Build/Products/Release/Mac Activity.app"
          .github/scripts/notarize_and_staple.sh --path "${app}"

      - name: Package release artifacts
        id: package
        run: |
          products_dir="${RUNNER_TEMP}/MacActivityRelease/Build/Products/Release"
          app="${products_dir}/Mac Activity.app"
          mkdir -p dist
          zip_path="dist/${{ steps.release.outputs.artifact_stem }}.zip"
          ditto -c -k --keepParent "${app}" "${zip_path}"

          dsym_zip_path="dist/${{ steps.release.outputs.artifact_stem }}-dSYM.zip"
          dsym_staging="${RUNNER_TEMP}/MacActivity-dSYMs"
          rm -rf "${dsym_staging}"
          mkdir -p "${dsym_staging}"
          dsym_count=0

          while IFS= read -r -d '' dsym_path; do
            ditto "${dsym_path}" "${dsym_staging}/$(basename "${dsym_path}")"
            dsym_count=$((dsym_count + 1))
          done < <(find "${products_dir}" -maxdepth 1 -name "*.dSYM" -print0)

          if [[ "${dsym_count}" -gt 0 ]]; then
            ditto -c -k --keepParent "${dsym_staging}" "${dsym_zip_path}"
          else
            echo "::error::No dSYM bundles found to package."
            exit 1
          fi

          dmg_path="dist/${{ steps.release.outputs.artifact_stem }}.dmg"
          .github/scripts/create_dmg.sh \
            --app "${app}" \
            --output "${dmg_path}" \
            --volume-name "${{ steps.release.outputs.app_name }} ${{ steps.release.outputs.title }}" \
            --background assets/dmg/background.png

          checksums_path="dist/${{ steps.release.outputs.artifact_stem }}-SHA256SUMS.txt"

          {
            echo "zip_path=${zip_path}"
            echo "dsym_path=${dsym_zip_path}"
            echo "dmg_path=${dmg_path}"
            echo "checksums_path=${checksums_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Sign Developer ID disk image
        if: ${{ inputs.signing == 'developer-id' }}
        env:
          DEVELOPER_ID_APPLICATION_IDENTITY: ${{ vars.DEVELOPER_ID_APPLICATION_IDENTITY }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
        run: |
          dmg_path="${DMG_PATH}"
          signing_identity="${DEVELOPER_ID_APPLICATION_IDENTITY:-Developer ID Application}"
          codesign \
            --force \
            --sign "${signing_identity}" \
            --timestamp \
            "${dmg_path}"
          codesign --verify --verbose=4 "${dmg_path}"
          codesign -dvvv "${dmg_path}"

      - name: Notarize Developer ID disk image
        if: ${{ inputs.signing == 'developer-id' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
        run: |
          dmg_path="${DMG_PATH}"
          .github/scripts/notarize_and_staple.sh --path "${dmg_path}"

      - name: Validate packaged disk image contents
        if: ${{ inputs.signing == 'developer-id' }}
        env:
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
        run: |
          dmg_path="${DMG_PATH}"
          mount_point="$(mktemp -d "${RUNNER_TEMP}/MacActivityMountedDMG.XXXXXX")"

          cleanup() {
            hdiutil detach "${mount_point}" >/dev/null 2>&1 || hdiutil detach "${mount_point}" -force >/dev/null 2>&1 || true
            rm -rf "${mount_point}"
          }

          trap cleanup EXIT

          hdiutil attach -readonly -nobrowse -mountpoint "${mount_point}" "${dmg_path}"

          app="${mount_point}/Mac Activity.app"
          if [[ ! -d "${app}" ]]; then
            echo "::error::Expected Mac Activity.app at DMG root."
            exit 1
          fi

          applications_alias="${mount_point}/Applications"
          if [[ ! -f "${applications_alias}" ]]; then
            echo "::error::Expected Applications Finder alias at DMG root."
            exit 1
          fi
          if [[ -L "${applications_alias}" ]]; then
            echo "::error::Expected Applications Finder alias, got symlink."
            exit 1
          fi
          if ! file "${applications_alias}" | grep -q "MacOS Alias file"; then
            echo "::error::Applications item is not a Finder alias."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${app}"
          xcrun stapler validate "${app}"
          syspolicy_check distribution "${app}"

      - name: Generate release checksums
        run: |
          checksums_path="${{ steps.package.outputs.checksums_path }}"
          (
            cd dist
            shasum -a 256 \
              "$(basename "${{ steps.package.outputs.dmg_path }}")" \
              "$(basename "${{ steps.package.outputs.zip_path }}")" \
              "$(basename "${{ steps.package.outputs.dsym_path }}")" \
              > "$(basename "${checksums_path}")"
          )

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_path="dist/${{ steps.release.outputs.artifact_stem }}-release-notes.md"
          python3 .github/scripts/generate_release_notes.py \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${{ steps.target.outputs.sha }}" \
            --output "${notes_path}"

          metadata_path="${notes_path}.metadata"
          {
            echo "<!-- MacActivityReleaseTag: ${{ steps.release.outputs.tag }} -->"
            echo "<!-- MacActivityBundleBuild: ${{ steps.release.outputs.build }} -->"
            echo "<!-- MacActivityReleaseRunId: ${GITHUB_RUN_ID} -->"
            if [[ -n "${{ steps.release.outputs.prerelease_number }}" ]]; then
              echo "<!-- MacActivityPrerelease: ${{ steps.release.outputs.prerelease_number }} -->"
            fi
            cat "${notes_path}"
          } > "${metadata_path}"
          mv "${metadata_path}" "${notes_path}"

          echo "notes_path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.artifact_stem }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.dsym_path }}
            ${{ steps.package.outputs.dmg_path }}
            ${{ steps.package.outputs.checksums_path }}
            ${{ steps.notes.outputs.notes_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          DSYM_PATH: ${{ steps.package.outputs.dsym_path }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
          CHECKSUMS_PATH: ${{ steps.package.outputs.checksums_path }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          LATEST: ${{ steps.release.outputs.latest }}
        run: |
          args=(
            "${TAG}"
            "${DMG_PATH}"
            "${ZIP_PATH}"
            "${DSYM_PATH}"
            "${CHECKSUMS_PATH}"
            --title "${TITLE}"
            --target "${TARGET_SHA}"
            --notes "$(cat "${NOTES_PATH}")"
            --latest="${LATEST}"
            --draft
          )
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

  create_release_from_artifact:
    name: Create Draft Release From Dry Run
    runs-on: macos-26
    needs: [preflight, ci]
    if: ${{ always() && needs.preflight.result == 'success' && inputs.create_github_release && inputs.source_run_id != '' && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    environment:
      name: release-signing
      deployment: false
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Resolve expected release artifact
        id: expected
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          channel="${CHANNEL}"
          version="${VERSION}"
          prerelease="${PRERELEASE}"

          if [[ "${channel}" == "release" ]]; then
            tag="v${version}"
          else
            tag="v${version}-${channel}.${prerelease}"
          fi

          {
            echo "tag=${tag}"
            echo "artifact_stem=MacActivity-${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate source workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          source_json="$(gh run view "${SOURCE_RUN_ID}" --json conclusion,headSha,status,workflowName)"
          status="$(jq -r '.status' <<< "${source_json}")"
          conclusion="$(jq -r '.conclusion' <<< "${source_json}")"
          head_sha="$(jq -r '.headSha' <<< "${source_json}")"
          workflow_name="$(jq -r '.workflowName' <<< "${source_json}")"

          if [[ "${workflow_name}" != "Release" ]]; then
            echo "::error::Expected source run ${SOURCE_RUN_ID} to use the Release workflow, got ${workflow_name}."
            exit 1
          fi
          if [[ "${status}" != "completed" || "${conclusion}" != "success" ]]; then
            echo "::error::Expected source run ${SOURCE_RUN_ID} to be completed successfully, got status=${status}, conclusion=${conclusion}."
            exit 1
          fi
          if [[ "${head_sha}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Expected source run ${SOURCE_RUN_ID} to target ${GITHUB_SHA}, got ${head_sha}."
            exit 1
          fi

      - name: Download dry-run artifact
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          ARTIFACT_STEM: ${{ steps.expected.outputs.artifact_stem }}
        run: |
          download_dir="${RUNNER_TEMP}/release-artifact"
          mkdir -p "${download_dir}"
          gh run download "${SOURCE_RUN_ID}" --name "${ARTIFACT_STEM}" --dir "${download_dir}"
          echo "download_dir=${download_dir}" >> "${GITHUB_OUTPUT}"

      - name: Validate dry-run artifact
        id: artifact
        env:
          DOWNLOAD_DIR: ${{ steps.download.outputs.download_dir }}
          TAG: ${{ steps.expected.outputs.tag }}
          ARTIFACT_STEM: ${{ steps.expected.outputs.artifact_stem }}
          REQUESTED_BUILD: ${{ inputs.build }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          VERSION: ${{ inputs.version }}
        run: |
          zip_path="${DOWNLOAD_DIR}/${ARTIFACT_STEM}.zip"
          dsym_path="${DOWNLOAD_DIR}/${ARTIFACT_STEM}-dSYM.zip"
          dmg_path="${DOWNLOAD_DIR}/${ARTIFACT_STEM}.dmg"
          checksums_path="${DOWNLOAD_DIR}/${ARTIFACT_STEM}-SHA256SUMS.txt"
          notes_path="${DOWNLOAD_DIR}/${ARTIFACT_STEM}-release-notes.md"

          for path in "${zip_path}" "${dsym_path}" "${dmg_path}" "${checksums_path}" "${notes_path}"; do
            if [[ ! -f "${path}" ]]; then
              echo "::error::Expected dry-run artifact file ${path}."
              exit 1
            fi
          done

          (
            cd "${DOWNLOAD_DIR}"
            shasum -a 256 -c "$(basename "${checksums_path}")"
          )

          artifact_tag="$(sed -nE 's/^<!-- MacActivityReleaseTag: ([^ ]+) -->$/\1/p' "${notes_path}" | head -n 1)"
          artifact_build="$(sed -nE 's/^<!-- MacActivityBundleBuild: ([1-9][0-9]*) -->$/\1/p' "${notes_path}" | head -n 1)"
          artifact_run_id="$(sed -nE 's/^<!-- MacActivityReleaseRunId: ([1-9][0-9]*) -->$/\1/p' "${notes_path}" | head -n 1)"
          if [[ "${artifact_tag}" != "${TAG}" ]]; then
            echo "::error::Expected release notes tag ${TAG}, got ${artifact_tag}."
            exit 1
          fi
          if [[ -z "${artifact_build}" ]]; then
            echo "::error::Release notes are missing MacActivityBundleBuild metadata."
            exit 1
          fi
          if [[ "${artifact_run_id}" != "${SOURCE_RUN_ID}" ]]; then
            echo "::error::Expected release notes run ID ${SOURCE_RUN_ID}, got ${artifact_run_id}."
            exit 1
          fi
          if [[ -n "${REQUESTED_BUILD}" && "${artifact_build}" != "${REQUESTED_BUILD}" ]]; then
            echo "::error::Expected dry-run build ${REQUESTED_BUILD}, got ${artifact_build}."
            exit 1
          fi

          expanded_dir="${RUNNER_TEMP}/release-artifact-expanded"
          rm -rf "${expanded_dir}"
          mkdir -p "${expanded_dir}"
          ditto -x -k "${zip_path}" "${expanded_dir}"

          app="${expanded_dir}/Mac Activity.app"
          info_plist="${app}/Contents/Info.plist"
          if [[ ! -d "${app}" ]]; then
            echo "::error::Expected Mac Activity.app in ${zip_path}."
            exit 1
          fi

          actual_version="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "${info_plist}")"
          actual_release_tag="$(/usr/libexec/PlistBuddy -c "Print MacActivityReleaseTag" "${info_plist}")"
          actual_build="$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "${info_plist}")"
          if [[ "${actual_version}" != "${VERSION}" ]]; then
            echo "::error::Expected CFBundleShortVersionString ${VERSION}, got ${actual_version}."
            exit 1
          fi
          if [[ "${actual_release_tag}" != "${TAG}" ]]; then
            echo "::error::Expected MacActivityReleaseTag ${TAG}, got ${actual_release_tag}."
            exit 1
          fi
          if [[ "${actual_build}" != "${artifact_build}" ]]; then
            echo "::error::Expected CFBundleVersion ${artifact_build}, got ${actual_build}."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${app}"
          xcrun stapler validate "${app}"
          syspolicy_check distribution "${app}"
          codesign --verify --verbose=4 "${dmg_path}"
          xcrun stapler validate "${dmg_path}"

          mount_point="$(mktemp -d "${RUNNER_TEMP}/MacActivityMountedDMG.XXXXXX")"
          cleanup() {
            hdiutil detach "${mount_point}" >/dev/null 2>&1 || hdiutil detach "${mount_point}" -force >/dev/null 2>&1 || true
            rm -rf "${mount_point}"
          }
          trap cleanup EXIT

          hdiutil attach -readonly -nobrowse -mountpoint "${mount_point}" "${dmg_path}"
          dmg_app="${mount_point}/Mac Activity.app"
          if [[ ! -d "${dmg_app}" ]]; then
            echo "::error::Expected Mac Activity.app at DMG root."
            exit 1
          fi

          applications_alias="${mount_point}/Applications"
          if [[ ! -f "${applications_alias}" ]]; then
            echo "::error::Expected Applications Finder alias at DMG root."
            exit 1
          fi
          if [[ -L "${applications_alias}" ]]; then
            echo "::error::Expected Applications Finder alias, got symlink."
            exit 1
          fi
          if ! file "${applications_alias}" | grep -q "MacOS Alias file"; then
            echo "::error::Applications item is not a Finder alias."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${dmg_app}"
          xcrun stapler validate "${dmg_app}"
          syspolicy_check distribution "${dmg_app}"

          echo "build=${artifact_build}" >> "${GITHUB_OUTPUT}"

      - name: Check release conflicts
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          BUILD: ${{ steps.artifact.outputs.build }}
        run: |
          python3 .github/scripts/plan_release.py \
            --channel "${CHANNEL}" \
            --version "${VERSION}" \
            --prerelease "${PRERELEASE}" \
            --build "${BUILD}" \
            --remote

      - name: Prepare release metadata
        id: release
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          BUILD: ${{ steps.artifact.outputs.build }}
        run: |
          python3 .github/scripts/prepare_release_metadata.py \
            --channel "${CHANNEL}" \
            --version "${VERSION}" \
            --prerelease "${PRERELEASE}" \
            --build "${BUILD}" \
            --xcconfig Configuration/Shared.xcconfig

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DOWNLOAD_DIR: ${{ steps.download.outputs.download_dir }}
          ARTIFACT_STEM: ${{ steps.release.outputs.artifact_stem }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
          ZIP_PATH: ${{ steps.download.outputs.download_dir }}/${{ steps.release.outputs.artifact_stem }}.zip
          DSYM_PATH: ${{ steps.download.outputs.download_dir }}/${{ steps.release.outputs.artifact_stem }}-dSYM.zip
          DMG_PATH: ${{ steps.download.outputs.download_dir }}/${{ steps.release.outputs.artifact_stem }}.dmg
          CHECKSUMS_PATH: ${{ steps.download.outputs.download_dir }}/${{ steps.release.outputs.artifact_stem }}-SHA256SUMS.txt
          NOTES_PATH: ${{ steps.download.outputs.download_dir }}/${{ steps.release.outputs.artifact_stem }}-release-notes.md
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          LATEST: ${{ steps.release.outputs.latest }}
        run: |
          args=(
            "${TAG}"
            "${DMG_PATH}"
            "${ZIP_PATH}"
            "${DSYM_PATH}"
            "${CHECKSUMS_PATH}"
            --title "${TITLE}"
            --target "${{ github.sha }}"
            --notes "$(cat "${NOTES_PATH}")"
            --latest="${LATEST}"
            --draft
          )
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
