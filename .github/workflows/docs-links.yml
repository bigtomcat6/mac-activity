name: Docs Links

on:
  pull_request:
    branches: ["main"]
    paths:
      - README.md
      - docs/**/*.md
      - .github/*.md
      - .github/workflows/docs-links.yml
  push:
    branches: ["main"]
    paths:
      - README.md
      - docs/**/*.md
      - .github/*.md
      - .github/workflows/docs-links.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "${{ github.workspace }}"
            --max-retries 2
            --retry-wait-time 2
            README.md
            "docs/**/*.md"
            ".github/*.md"
          fail: true
