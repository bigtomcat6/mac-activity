name: Publish Sparkle appcast

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish into the Sparkle appcast.
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write
  pages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  appcast:
    name: Publish Sparkle appcast
    runs-on: macos-26
    environment:
      name: release-signing
      deployment: false
    timeout-minutes: 20
    outputs:
      pages_changed: ${{ steps.publish.outputs.pages_changed }}
      publish: ${{ steps.release.outputs.publish }}

    steps:
      - name: Checkout trusted tooling
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve appcast release
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "::error::A release tag is required."
            exit 1
          fi

          git fetch --force origin "+refs/heads/main:refs/remotes/origin/main" "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          if [[ -z "${tag_commit}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not resolve to a commit."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::Release tag ${RELEASE_TAG} must point to a commit reachable from main."
            exit 1
          fi

          publish=true
          channel=release
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            channel=release
          elif [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta)\.[1-9][0-9]*$ ]]; then
            channel="${BASH_REMATCH[1]}"
          else
            echo "::notice::${RELEASE_TAG} is not an alpha, beta, or release updater tag; skipping appcast."
            publish=false
          fi

          {
            echo "tag=${RELEASE_TAG}"
            echo "tag_commit=${tag_commit}"
            echo "channel=${channel}"
            echo "publish=${publish}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download release archive
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          archive_dir="${RUNNER_TEMP}/sparkle-archives"
          mkdir -p "${archive_dir}"

          asset_name="MacActivity-${TAG}.zip"
          checksums_name="MacActivity-${TAG}-SHA256SUMS.txt"
          gh release download "${TAG}" --pattern "${asset_name}" --dir "${archive_dir}" --clobber
          gh release download "${TAG}" --pattern "${checksums_name}" --dir "${archive_dir}" --clobber

          for asset in "${asset_name}" "${checksums_name}"; do
            if [[ ! -f "${archive_dir}/${asset}" ]]; then
              echo "::error::Expected release asset ${asset}."
              exit 1
            fi
          done

          gh release view "${TAG}" --json body --jq '.body // ""' \
            > "${archive_dir}/MacActivity-${TAG}.md"

      - name: Validate release archive
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TAG_COMMIT: ${{ steps.release.outputs.tag_commit }}
        run: |
          archive_dir="${RUNNER_TEMP}/sparkle-archives"
          artifact_dir="${RUNNER_TEMP}/sparkle-source-artifact"
          expanded_dir="${RUNNER_TEMP}/sparkle-expanded"
          asset_name="MacActivity-${TAG}.zip"
          checksums_name="MacActivity-${TAG}-SHA256SUMS.txt"
          notes_name="MacActivity-${TAG}.md"
          zip_path="${archive_dir}/${asset_name}"
          checksums_path="${archive_dir}/${checksums_name}"
          notes_path="${archive_dir}/${notes_name}"

          expected_zip_checksum="$(awk -v name="${asset_name}" '$2 == name { print $1 }' "${checksums_path}" | head -n 1)"
          actual_zip_checksum="$(shasum -a 256 "${zip_path}" | awk '{ print $1 }')"
          if [[ -z "${expected_zip_checksum}" ]]; then
            echo "::error::Expected ${checksums_name} to include ${asset_name}."
            exit 1
          fi
          if [[ "${actual_zip_checksum}" != "${expected_zip_checksum}" ]]; then
            echo "::error::Release ZIP checksum mismatch for ${asset_name}."
            exit 1
          fi

          source_run_id="$(sed -nE 's/^<!-- MacActivityReleaseRunId: ([1-9][0-9]*) -->$/\1/p' "${notes_path}" | head -n 1)"
          if [[ -z "${source_run_id}" ]]; then
            echo "::error::Release notes are missing MacActivityReleaseRunId metadata."
            exit 1
          fi

          source_json="$(gh run view "${source_run_id}" --json conclusion,headSha,status,workflowName)"
          status="$(jq -r '.status' <<< "${source_json}")"
          conclusion="$(jq -r '.conclusion' <<< "${source_json}")"
          head_sha="$(jq -r '.headSha' <<< "${source_json}")"
          workflow_name="$(jq -r '.workflowName' <<< "${source_json}")"

          if [[ "${workflow_name}" != "Release" ]]; then
            echo "::error::Expected source run ${source_run_id} to use the Release workflow, got ${workflow_name}."
            exit 1
          fi
          if [[ "${status}" != "completed" || "${conclusion}" != "success" ]]; then
            echo "::error::Expected source run ${source_run_id} to be completed successfully, got status=${status}, conclusion=${conclusion}."
            exit 1
          fi
          if [[ "${head_sha}" != "${TAG_COMMIT}" ]]; then
            echo "::error::Expected source run ${source_run_id} to target ${TAG_COMMIT}, got ${head_sha}."
            exit 1
          fi

          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"
          gh run download "${source_run_id}" --name "MacActivity-${TAG}" --dir "${artifact_dir}"
          for artifact in "${asset_name}" "${checksums_name}"; do
            if [[ ! -f "${artifact_dir}/${artifact}" ]]; then
              echo "::error::Expected source workflow artifact ${artifact}."
              exit 1
            fi
            if ! cmp -s "${archive_dir}/${artifact}" "${artifact_dir}/${artifact}"; then
              echo "::error::Release asset ${artifact} does not match source workflow artifact."
              exit 1
            fi
          done

          rm -rf "${expanded_dir}"
          mkdir -p "${expanded_dir}"

          ditto -x -k "${zip_path}" "${expanded_dir}"
          app="${expanded_dir}/Mac Activity.app"
          info_plist="${app}/Contents/Info.plist"
          if [[ ! -d "${app}" ]]; then
            echo "::error::Expected Mac Activity.app in ${asset_name}."
            exit 1
          fi

          actual_release_tag="$(/usr/libexec/PlistBuddy -c "Print MacActivityReleaseTag" "${info_plist}")"
          if [[ "${actual_release_tag}" != "${TAG}" ]]; then
            echo "::error::Expected MacActivityReleaseTag ${TAG}, got ${actual_release_tag}."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${app}"
          xcrun stapler validate "${app}"
          syspolicy_check distribution "${app}"

      - name: Build Sparkle appcast tool
        if: ${{ steps.release.outputs.publish == 'true' }}
        run: |
          swift package resolve
          tool_build_dir="${RUNNER_TEMP}/SparkleToolBuild"
          xcodebuild \
            -project .build/checkouts/Sparkle/Sparkle.xcodeproj \
            -scheme generate_appcast \
            -configuration Release \
            -derivedDataPath "${tool_build_dir}" \
            SWIFT_SUPPRESS_WARNINGS=YES \
            -quiet \
            build

      - name: Publish Sparkle appcast
        id: publish
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          TAG: ${{ steps.release.outputs.tag }}
          CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY}" ]]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is required."
            exit 1
          fi

          archive_dir="${RUNNER_TEMP}/sparkle-archives"
          pages_dir="${RUNNER_TEMP}/gh-pages"
          generate_appcast="${RUNNER_TEMP}/SparkleToolBuild/Build/Products/Release/generate_appcast"

          if [[ ! -x "${generate_appcast}" ]]; then
            echo "::error::generate_appcast was not built."
            exit 1
          fi

          gh auth setup-git
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" "${pages_dir}"
          else
            git init "${pages_dir}"
            git -C "${pages_dir}" checkout -b gh-pages
            git -C "${pages_dir}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          if [[ -f "${pages_dir}/appcast.xml" ]]; then
            cp "${pages_dir}/appcast.xml" "${archive_dir}/appcast.xml"
          fi

          channel_args=()
          if [[ "${CHANNEL}" != "release" ]]; then
            channel_args=(--channel "${CHANNEL}")
          fi

          download_url_prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          printf '%s' "${SPARKLE_ED_PRIVATE_KEY}" | "${generate_appcast}" --ed-key-file - \
            --download-url-prefix "${download_url_prefix}" \
            --maximum-versions 20 \
            "${channel_args[@]}" \
            -o "${pages_dir}/appcast.xml" \
            "${archive_dir}"

          release_notes_name="MacActivity-${TAG}.md"
          python3 .github/scripts/prepare_appcast_publication.py \
            --appcast "${pages_dir}/appcast.xml" \
            --release-notes "${archive_dir}/${release_notes_name}" \
            --tag "${TAG}"

          cp "${archive_dir}/${release_notes_name}" "${pages_dir}/${release_notes_name}"

          git -C "${pages_dir}" config user.name "github-actions[bot]"
          git -C "${pages_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${pages_dir}" add appcast.xml "${release_notes_name}"
          if git -C "${pages_dir}" diff --cached --quiet; then
            echo "pages_changed=false" >> "${GITHUB_OUTPUT}"
            echo "Appcast is already current."
            exit 0
          fi

          git -C "${pages_dir}" commit -m "Update Sparkle appcast for ${TAG}"
          git -C "${pages_dir}" push origin HEAD:gh-pages
          echo "pages_changed=true" >> "${GITHUB_OUTPUT}"

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [appcast]
    if: ${{ needs.appcast.outputs.publish == 'true' && needs.appcast.outputs.pages_changed == 'true' }}
    timeout-minutes: 10

    steps:
      - name: Check Pages build type
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type')"
          echo "build_type=${build_type}" >> "${GITHUB_OUTPUT}"

      - name: Skip legacy Pages source
        if: ${{ steps.pages.outputs.build_type != 'workflow' }}
        run: |
          echo "::notice::GitHub Pages is still using legacy branch deployments; set the Pages source to GitHub Actions to use this job."

      - name: Checkout gh-pages
        if: ${{ steps.pages.outputs.build_type == 'workflow' }}
        uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Configure Pages
        if: ${{ steps.pages.outputs.build_type == 'workflow' }}
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: ${{ steps.pages.outputs.build_type == 'workflow' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: ${{ steps.pages.outputs.build_type == 'workflow' }}
        id: deployment
        uses: actions/deploy-pages@v5
