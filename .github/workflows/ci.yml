name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run CI Checks
    uses: ./.github/workflows/ci-checks.yml
    with:
      suite: full

  required-ci:
    name: SwiftPM + Xcode Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() }}

    steps:
      - name: Verify CI result
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::CI checks finished with result '${{ needs.test.result }}'."
            exit 1
          fi
