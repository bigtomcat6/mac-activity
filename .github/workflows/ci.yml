name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run CI Checks
    uses: ./.github/workflows/ci-checks.yml
    with:
      suite: full
    secrets: inherit
