included:
  - Sources
  - Tests
  - Tools

excluded:
  - .build
  - DerivedData

disabled_rules:
  - line_length
  - function_body_length
  - file_length
  - type_body_length
  - trailing_comma

cyclomatic_complexity:
  warning: 28
  error: 35

function_parameter_count:
  warning: 12
  error: 15

strict: false
reporter: github-actions-logging
